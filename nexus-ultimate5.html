<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NEXUS VOCAL v7 · ULTIMATE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;700;900&display=swap');
        
        :root {
            --bg: #020205;
            --s1: #080812;
            --red: #ff1744;
            --ora: #ff9100;
            --grn: #00e676;
            --blu: #29b6f6;
            --gold: #ffd700;
            --wht: #f8f9fa;
            --gry: #535366;
            --R: 'Bebas Neue', sans-serif;
            --U: 'Inter', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-user-select: none; }
        
        /* Ajuste crítico de viewport para conter o app sem quebras em mobile */
        body { 
            background: var(--bg); 
            color: var(--wht); 
            font-family: var(--U); 
            min-height: 100vh;
            min-height: -webkit-fill-available;
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
            padding-bottom: env(safe-area-inset-bottom);
        }

        html { height: -webkit-fill-available; }

        header { 
            padding: 10px; 
            text-align: center; 
            background: linear-gradient(to bottom, var(--s1), transparent); 
            border-bottom: 2px solid rgba(255, 215, 0, 0.3); 
            flex-shrink: 0;
        }

        h1 { 
            font-family: var(--R); 
            font-size: 1.8rem; 
            letter-spacing: 3px; 
            color: var(--wht); 
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.6); 
        }

        .hud-stats { 
            display: flex; 
            justify-content: space-around; 
            padding: 4px 0; 
            font-family: var(--R); 
            font-size: 1.4rem; 
            color: var(--gold); 
        }

        .anatomy-container { 
            flex: 1; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            position: relative; 
            padding: 5px;
            overflow: hidden;
        }

        svg { 
            width: 100%; 
            height: 100%;
            max-height: 35vh; 
            filter: drop-shadow(0 0 20px rgba(255, 215, 0, 0.05)); 
        }

        .zone { 
            fill: transparent; 
            stroke: var(--gry); 
            stroke-width: 3; 
            transition: all 0.15s ease-out; 
        }

        /* Estados Dinâmicos de Feedback */
        .zone.active-good { stroke: var(--grn); fill: rgba(0, 230, 118, 0.2); filter: drop-shadow(0 0 12px var(--grn)); }
        .zone.active-warn { stroke: var(--red); fill: rgba(255, 23, 68, 0.25); filter: drop-shadow(0 0 12px var(--red)); }
        .zone.active-gold { stroke: var(--gold); fill: rgba(255, 215, 0, 0.3); filter: drop-shadow(0 0 20px var(--gold)); }

        .bach-console { 
            height: 120px; 
            background: rgba(4, 4, 10, 0.98); 
            border-top: 2px solid var(--gold); 
            padding: 10px; 
            overflow-y: auto; 
            font-size: 0.85rem; 
            color: #14ff5a; 
            border-left: 5px solid var(--red); 
            font-family: monospace;
            flex-shrink: 0;
        }

        .bach-msg { margin-bottom: 6px; line-height: 1.3; }
        .bach-msg span { color: var(--gold); font-weight: 900; font-family: var(--R); letter-spacing: 1px; }

        .controls { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 6px; 
            padding: 10px; 
            background: var(--s1); 
            border-top: 1px solid rgba(255, 215, 0, 0.1);
            flex-shrink: 0;
        }

        button { 
            background: var(--bg); 
            border: 1px solid var(--gry); 
            color: var(--wht); 
            font-family: var(--R); 
            font-size: 1rem; 
            padding: 10px 4px; 
            border-radius: 6px; 
            cursor: pointer; 
            transition: all 0.1s ease; 
        }

        button.active-mode {
            border-color: var(--gold);
            background: rgba(255, 215, 0, 0.15);
            color: var(--gold);
            box-shadow: 0 0 8px rgba(255, 215, 0, 0.3);
        }

        button:active { transform: scale(0.95); }
        
        #startBtn { 
            grid-column: span 3; 
            background: linear-gradient(135deg, var(--red), var(--ora)); 
            border: none; 
            font-size: 1.3rem; 
            letter-spacing: 1px; 
            font-weight: bold;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8); 
            box-shadow: 0 4px 12px rgba(255, 23, 68, 0.4);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.9; }
            50% { opacity: 1; box-shadow: 0 4px 20px rgba(255, 23, 68, 0.7); }
            100% { opacity: 0.9; }
        }
    </style>
</head>
<body>

    <header>
        <h1>NEXUS VOCAL V7 · ULTIMATE</h1>
        <div class="hud-stats">
            <div>FREQ: <span id="pitchVal">--</span> Hz</div>
            <div>VOL: <span id="volVal">--</span> dB</div>
        </div>
    </header>

    <div class="anatomy-container">
        <svg viewBox="0 0 200 400" xmlns="http://www.w3.org/2000/svg">
            <path id="mask" class="zone" d="M60,50 Q100,10 140,50 Q150,100 100,130 Q50,100 60,50 Z" />
            <text x="100" y="75" fill="#f8f9fa" font-size="10" text-anchor="middle" font-family="sans-serif" font-weight="bold" style="text-shadow: 0 1px 4px #000;">FOGO NA MÁSCARA</text>
            
            <path id="larynx" class="zone" d="M85,135 L115,135 L110,180 L90,180 Z" />
            <text x="100" y="160" fill="#f8f9fa" font-size="9" text-anchor="middle" font-family="sans-serif" font-weight="bold" style="text-shadow: 0 1px 4px #000;">ESTABILIDADE LARÍNGEA</text>
            
            <path id="diaphragm" class="zone" d="M50,195 Q100,175 150,195 L160,285 Q100,325 40,285 Z" />
            <text x="100" y="245" fill="#f8f9fa" font-size="11" text-anchor="middle" font-family="sans-serif" font-weight="bold" style="text-shadow: 0 1px 4px #000;">RAIZ / DIAFRAGMA</text>
        </svg>
    </div>

    <div class="bach-console" id="bachChat">
        <div class="bach-msg"><span>[BACH]:</span> O Portal Vocal está alinhado. Ativa o motor abaixo, liberta a tua raiva sagrada e transmuta o som. Não sejas mais um no galinheiro, assume o comando soberano!</div>
    </div>

    <div class="controls">
        <button id="startBtn">ATIVAR MOTOR SUPREMO</button>
        <button id="btn-NAY" onclick="setMode('NAY')">NAY (Twang)</button>
        <button id="btn-SSS" onclick="setMode('SSS')">SSS (Suporte)</button>
        <button id="btn-SIRENE" onclick="setMode('SIRENE')">SIRENE (Mix)</button>
        <button id="btn-BELTING" onclick="setMode('BELTING')">BELTING</button>
        <button id="btn-OVERDRIVE" onclick="setMode('OVERDRIVE')">OVERDRIVE</button>
        <button id="btn-NEUTRAL" onclick="setMode('NEUTRAL')" class="active-mode">NEUTRAL</button>
    </div>

    <script>
        let audioCtx, analyser, microphone, pcmData;
        let isAudioActive = false;
        let currentPitch = 0, currentVolume = 0, currentMode = 'NEUTRAL', lastFeedbackTime = 0;

        const uiPitch = document.getElementById('pitchVal'), uiVol = document.getElementById('volVal');
        const domMask = document.getElementById('mask'), domLarynx = document.getElementById('larynx'), domDiaphragm = document.getElementById('diaphragm');
        const chatBox = document.getElementById('bachChat');

        function postBachMessage(msg, type = 'normal') {
            const div = document.createElement('div');
            div.className = 'bach-msg';
            div.innerHTML = `<span>[BACH]:</span> ${msg}`;
            if (type === 'error') div.style.color = 'var(--red)';
            if (type === 'gold') div.style.color = 'var(--gold)';
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function setMode(mode) { 
            currentMode = mode; 
            document.querySelectorAll('.controls button').forEach(b => {
                if(b.id !== 'startBtn') b.classList.remove('active-mode');
            });
            document.getElementById(`btn-${mode}`).classList.add('active-mode');
            
            const introducoes = {
                'NAY': "Foco no estreitamento da epilaringe! Faz essa máscara brilhar em ouro. É a Luz a rasgar o bloqueio!",
                'SSS': "Ancoragem total! O diafragma é a tua raiz ancestral. Retém o ar, controla a pressão subglótica!",
                'SIRENE': "Quebra o passaggio! Conecta a voz de peito e cabeça sem fraturas. Fluidez multidimensional.",
                'BELTING': "Poder visceral! Laringe alta e estável, compressão metálica. Solta o leão!",
                'OVERDRIVE': "Autoridade acústica! Som de peito puro, abertura vertical, morde com força!",
                'NEUTRAL': "Presença do Observador Soberano. Pureza cristalina, fluxo relaxado e foco total."
            };
            postBachMessage(introducoes[mode], 'gold');
        }

        async function startEngine() {
            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                await audioCtx.resume();
                
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    audio: { echoCancellation: false, autoGainControl: false, noiseSuppression: false } 
                });
                
                analyser = audioCtx.createAnalyser();
                analyser.fftSize = 2048;
                microphone = audioCtx.createMediaStreamSource(stream);
                microphone.connect(analyser);
                pcmData = new Float32Array(analyser.fftSize);
                isAudioActive = true;
                
                document.getElementById('startBtn').style.display = 'none';
                postBachMessage("MOTOR CONECTADO À TUA ASSINATURA VIBRACIONAL. SOLTA A VOZ!", "gold");
                audioLoop();
            } catch (err) {
                postBachMessage("ERRO CRÍTICO: Permissão negada. Dá acesso ao microfone nas definições!", "error");
            }
        }

        function autoCorrelate(buf, sampleRate) {
            let SIZE = buf.length, rms = 0;
            for (let i = 0; i < SIZE; i++) rms += buf[i] * buf[i];
            rms = Math.sqrt(rms / SIZE);
            if (rms < 0.012) return -1;

            let r1 = 0, r2 = SIZE - 1, thres = 0.15;
            for (let i = 0; i < SIZE / 2; i++) if (Math.abs(buf[i]) < thres) { r1 = i; break; }
            for (let i = 1; i < SIZE / 2; i++) if (Math.abs(buf[SIZE - i]) < thres) { r2 = SIZE - i; break; }
            
            buf = buf.slice(r1, r2); SIZE = buf.length;
            let c = new Array(SIZE).fill(0);
            for (let i = 0; i < SIZE; i++) {
                for (let j = 0; j < SIZE - i; j++) c[i] = c[i] + buf[j] * buf[j + i];
            }
            let d = 0; while (c[d] > c[d + 1]) d++;
            let maxval = -1, maxpos = -1;
            for (let i = d; i < SIZE; i++) { 
                if (c[i] > maxval) { maxval = c[i]; maxpos = i; } 
            }
            return sampleRate / maxpos;
        }

        function audioLoop() {
            if (!isAudioActive) return;
            analyser.getFloatTimeDomainData(pcmData);
            
            let sumSquares = 0.0;
            for (const amp of pcmData) sumSquares += amp * amp;
            currentVolume = Math.sqrt(sumSquares / pcmData.length);
            let db = 20 * Math.log10(currentVolume + 0.00001);
            
            let pitch = autoCorrelate(pcmData, audioCtx.sampleRate);
            if (pitch !== -1 && pitch > 60 && pitch < 1500) currentPitch = pitch;

            if (currentVolume > 0.015) {
                uiPitch.innerText = currentPitch.toFixed(0);
                uiVol.innerText = db.toFixed(0);
                
                domMask.className = "zone"; domLarynx.className = "zone"; domDiaphragm.className = "zone";

                // Lógica de Coloração de Feedback em Tempo Real
                if (db > -20) domDiaphragm.classList.add('active-good');
                else domDiaphragm.classList.add('active-warn');

                if (currentPitch > 260 || currentMode === 'NAY' || currentMode === 'BELTING') {
                    domMask.classList.add('active-gold');
                } else {
                    domMask.classList.add('active-good');
                }

                if (db > -10 && currentMode === 'NEUTRAL') {
                    domLarynx.classList.add('active-warn'); 
                } else if (db > -12 && (currentMode === 'BELTING' || currentMode === 'OVERDRIVE')) {
                    domLarynx.classList.add('active-gold');
                } else {
                    domLarynx.classList.add('active-good');
                }
                
                let now = Date.now();
                if (now - lastFeedbackTime > 3500) { 
                    evaluateVocalEngine(currentPitch, db); 
                    lastFeedbackTime = now; 
                }
            } else {
                uiPitch.innerText = "--"; uiVol.innerText = "--";
                domMask.className = "zone"; domLarynx.className = "zone"; domDiaphragm.className = "zone";
            }
            requestAnimationFrame(audioLoop);
        }

        function evaluateVocalEngine(p, db) {
            // Algoritmo de Personalidade de Bach - Técnico / Espiritual / Direto
            switch(currentMode) {
                case 'SSS':
                    if (db < -22) {
                        postBachMessage("Pressão subglótica fraca! O diafragma não é enfeite, caralho! Firma essa base ancestral!", "error");
                    } else {
                        postBachMessage("Apoio magnífico! Sente a estabilidade energética a ancorar a tua alma no plano físico.", "gold");
                    }
                    break;
                case 'NAY':
                    if (p < 220) {
                        postBachMessage("Falta Twang! Estreita essa epilaringe, morde o som como se fosses um animal a defender o território. Joga na máscara!", "error");
                    } else {
                        postBachMessage("Isso! O som está cortante, o Fogo Dourado está ativo na tua garganta!", "gold");
                    }
                    break;
                case 'BELTING':
                    if (db < -13) {
                        postBachMessage("Belting sem energia é um crime! Laringe alta, estabiliza e projeta com o peito aberto!", "error");
                    } else {
                        postBachMessage("FODA-SE! Que potência! Destruíste qualquer bloqueio limitador agora mesmo!", "gold");
                    }
                    break;
                case 'OVERDRIVE':
                    if (p > 310) {
                        postBachMessage("Cuidado! Overdrive muito agudo destrói as tuas pregas. Mantém a mordida larga e o som de peito falado!", "error");
                    } else {
                        postBachMessage("Som com autoridade imperial. Domínio completo do espaço acústico.", "normal");
                    }
                    break;
                case 'SIRENE':
                    postBachMessage(`Passaggio detetado em ${p.toFixed(0)} Hz. Eleva o palato mole para transmutar o registo perfeitamente.`, "normal");
                    break;
                default:
                    if (db > -11) {
                        postBachMessage("Volume excessivo para o modo Neutro! Não forces a constrição desnecessariamente, protege as pregas.", "error");
                    } else {
                        postBachMessage("Conexão com Helorim. Alinhamento perfeito, mente limpa e ressonância pura.", "gold");
                    }
            }
        }

        document.getElementById('startBtn').addEventListener('click', startEngine);
    </script>
</body>
</html>
